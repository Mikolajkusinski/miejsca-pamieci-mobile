name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.4
          cache: true

      - run: flutter pub get

      - run: flutter analyze --fatal-warnings

      - run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.4
          cache: true

      - run: flutter pub get

      # The Maps key falls back to android/local.defaults.properties in CI —
      # the debug APK only has to compile and link, not render tiles.
      - run: flutter build apk --debug --dart-define-from-file=env/dev.json
