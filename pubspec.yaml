name: memo_places_mobile
description: "Mobile companion app for Miejsca Pamięci (Places of Memory)."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  amplify_flutter: ^2.6.0
  amplify_auth_cognito: ^2.6.0
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.0
  shared_preferences: ^2.5.0        # non-sensitive prefs only
  flutter_secure_storage: ^10.3.0   # tokens live here
  jwt_decoder: ^2.0.1
  flutter_svg: ^2.2.0
  url_launcher: ^6.3.0
  intl: ^0.20.0
  fluttertoast: ^9.0.0
  google_sign_in: ^7.2.0
  flutter_slidable: ^4.0.0
  image_picker: ^1.2.0
  connectivity_plus: ^7.0.0
  easy_localization: ^3.0.8
  provider: ^6.1.0
  path_provider: ^2.1.5
  google_fonts: ^6.3.0              # Manrope display face (Phase 3)
  wakelock_plus: ^1.5.2

# device_info_plus >= 12.4.0 calls isiOSAppOnVision, declared only in the
# iOS 26.1 SDK — it does not compile with Xcode 26.0. 12.3.0 predates that
# call. Drop this pin once the build machine runs Xcode 26.1+.
dependency_overrides:
  device_info_plus: 12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.0
  flutter_lints: ^6.0.0
  mockito: ^5.5.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/app_logo.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - lib/assets/translations/
    - lib/assets/images/
    - lib/assets/map_styles/
    - lib/assets/markers/
